<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mock chat — Resonate test bench</title>
<!--
  A faithful stand-in for chatgpt.com's DOM contract: user turns are rendered as
  [data-message-author-role="user"] nodes, and the REAL extension content script
  (served at /ext/content.js) runs against this page through a tiny chrome-API shim.
  Used for automated verification of the panel, and as a controlled backdrop for
  filming the demo — same pixels, no network flakiness.
-->
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  body{margin:0;background:#212121;color:#ececec;font:15px/1.55 ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;
       display:flex;flex-direction:column;height:100vh}
  header{padding:12px 20px;border-bottom:1px solid #2f2f2f;font-weight:600;font-size:14px;color:#b4b4b4;
         display:flex;justify-content:space-between;align-items:center}
  header .badge{font-size:11px;color:#7a7a7a;font-weight:400}
  main{flex:1;overflow-y:auto;padding:28px 0 120px}
  .thread{max-width:720px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:22px}
  .turn{display:flex}
  .turn.user{justify-content:flex-end}
  .turn.user .msg{background:#2f2f2f;border-radius:18px;padding:10px 16px;max-width:70%}
  .turn.assistant .msg{max-width:85%;color:#d9d9d9}
  form{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(transparent,#212121 28%);padding:18px 0 22px}
  .box{max-width:720px;margin:0 auto;padding:0 24px;display:flex;gap:10px}
  input{flex:1;background:#2f2f2f;border:1px solid #424242;color:#ececec;border-radius:24px;
        padding:13px 18px;font:inherit;outline:none}
  input:focus{border-color:#5a5a5a}
  button{background:#ececec;color:#212121;border:none;border-radius:50%;width:44px;height:44px;
         font-size:17px;cursor:pointer}
  button:hover{background:#fff}
</style>
</head>
<body>
<header>
  <span>ChatGPT <span style="color:#6e6e6e">5</span></span>
  <span class="badge">mock page · Resonate test bench</span>
</header>
<main><div class="thread" id="thread">
  <div class="turn assistant"><div class="msg">Hi! I'm a mock assistant. Type like you would in a real chat — the Resonate extension script is watching this page exactly as it watches chatgpt.com.</div></div>
</div></main>
<form id="f">
  <div class="box">
    <input id="inp" autocomplete="off" placeholder="Message ChatGPT" autofocus>
    <button type="submit" title="Send">↑</button>
  </div>
</form>

<script>
  // ---- chrome API shim: routes the content script's messages straight to the engine ----
  window.chrome = {
    runtime: {
      lastError: null,
      sendMessage: function (msg, cb) {
        if (msg && msg.type === "resonate") {
          fetch("/resonate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: msg.text, user_id: msg.userId, event: "message",
                                   history: msg.history || [] }),
          }).then(r => r.json()).then(data => cb({ ok: true, data }))
            .catch(e => cb({ ok: false, error: String(e) }));
        } else if (msg && msg.type === "story") {
          fetch("/story", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: msg.userId, text: msg.text, beat: msg.beat,
                                   verse: msg.verse, memory_note: msg.memoryNote }),
          }).then(r => r.json()).then(data => cb({ ok: true, data }))
            .catch(e => cb({ ok: false, error: String(e) }));
        } else if (msg && msg.type === "handoff") {
          fetch("/handoff", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: msg.userId, text: msg.text }),
          }).catch(() => {});
        } else if (msg && msg.type === "tts") {
          fetch("/tts?voice=" + encodeURIComponent(msg.voice || "bella") +
                "&text=" + encodeURIComponent(msg.text || ""))
            .then(async r => {
              if (!r.ok) { cb({ ok: false, fallback: true }); return; }
              const buf = await r.arrayBuffer();
              let bin = ""; const bytes = new Uint8Array(buf); const CH = 0x8000;
              for (let i = 0; i < bytes.length; i += CH)
                bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
              cb({ ok: true, b64: btoa(bin), mime: "audio/wav" });
            }).catch(() => cb({ ok: false, fallback: true }));
        }
      },
    },
    storage: { sync: { get: (defs, cb) => cb(defs), set: () => {} } },
  };
</script>
<script src="/ext/content.js"></script>
<script>
  const thread = document.getElementById("thread");
  const f = document.getElementById("f");
  const inp = document.getElementById("inp");
  const CANNED = [
    "That makes sense. Tell me more about what's going on.",
    "I hear you. Let's take it one step at a time.",
    "Here's a way to think about it — break the problem into smaller parts and start with the one you can control.",
    "Good question. Let's work through it together.",
  ];
  let i = 0;
  f.addEventListener("submit", (e) => {
    e.preventDefault();
    const t = inp.value.trim();
    if (!t) return;
    const u = document.createElement("div");
    u.className = "turn user";
    u.innerHTML = '<div class="msg" data-message-author-role="user"></div>';
    u.querySelector(".msg").textContent = t;
    thread.appendChild(u);
    inp.value = "";
    setTimeout(() => {
      const a = document.createElement("div");
      a.className = "turn assistant";
      a.innerHTML = '<div class="msg"></div>';
      a.querySelector(".msg").textContent = CANNED[i++ % CANNED.length];
      thread.appendChild(a);
      a.scrollIntoView({ behavior: "smooth", block: "end" });
    }, 650);
    u.scrollIntoView({ behavior: "smooth", block: "end" });
  });
</script>
</body>
</html>
