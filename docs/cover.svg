<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#efe9df"/>
      <stop offset="0.6" stop-color="#e9e1d3"/>
      <stop offset="1" stop-color="#e3d7c4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#a65b43" stop-opacity="0.10"/>
      <stop offset="0.6" stop-color="#a65b43" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#f1ebdd"/>
      <stop offset="1" stop-color="#e6dac8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#211d17" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="22" y="22" width="1156" height="586" rx="10" fill="none" stroke="#211d17" stroke-opacity="0.14"/>

  <!-- wordmark -->
  <text x="70" y="98" font-size="40" fill="#211d17" font-weight="500"><tspan fill="#a65b43">✝</tspan> Resonate</text>

  <!-- AI chat window -->
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="520" height="356" rx="16" fill="#f7f3ec" stroke="#211d17" stroke-opacity="0.12"/>
  </g>
  <circle cx="100" cy="182" r="5" fill="#211d17" opacity="0.22"/>
  <circle cx="118" cy="182" r="5" fill="#211d17" opacity="0.22"/>
  <circle cx="136" cy="182" r="5" fill="#211d17" opacity="0.22"/>
  <text x="162" y="187" font-size="13" fill="#211d17" fill-opacity="0.5" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">AI chat</text>
  <!-- assistant text (muted bars) -->
  <rect x="100" y="222" width="360" height="13" rx="6" fill="#211d17" opacity="0.10"/>
  <rect x="100" y="247" width="420" height="13" rx="6" fill="#211d17" opacity="0.10"/>
  <rect x="100" y="272" width="300" height="13" rx="6" fill="#211d17" opacity="0.10"/>
  <rect x="100" y="306" width="380" height="13" rx="6" fill="#211d17" opacity="0.10"/>
  <!-- user bubble -->
  <rect x="262" y="408" width="300" height="70" rx="18" fill="#e7dece" stroke="#211d17" stroke-opacity="0.12"/>
  <text x="284" y="440" font-size="17" fill="#211d17" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">I feel like I'm failing</text>
  <text x="284" y="463" font-size="17" fill="#211d17" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">everyone lately.</text>

  <!-- the verse card (hero) -->
  <g filter="url(#shadow)">
    <rect x="560" y="246" width="452" height="262" rx="18" fill="url(#card)" stroke="#211d17" stroke-opacity="0.18"/>
  </g>
  <rect x="560" y="256" width="4" height="242" fill="#a65b43"/>
  <text x="596" y="300" font-size="15" fill="#a65b43" letter-spacing="3" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">ROMANS 8:1 · KJV</text>
  <line x1="596" y1="314" x2="640" y2="314" stroke="#a65b43" stroke-opacity="0.6"/>
  <text x="596" y="350" font-size="22" fill="#211d17">There is therefore now no</text>
  <text x="596" y="380" font-size="22" fill="#211d17">condemnation to them which</text>
  <text x="596" y="410" font-size="22" fill="#211d17">are in Christ Jesus.</text>
  <text x="596" y="450" font-size="14.5" font-style="italic" fill="#6b6358">You said “I feel like I'm failing everyone.”</text>
  <rect x="596" y="466" width="92" height="26" rx="13" fill="none" stroke="#a65b43" stroke-opacity="0.55"/>
  <text x="610" y="483" font-size="11" fill="#a65b43" letter-spacing="2" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">▸ LISTEN</text>

  <!-- tagline -->
  <text x="70" y="566" font-size="34" fill="#211d17">Scripture, where you already are.</text>
  <text x="70" y="593" font-size="13" fill="#6b6358" letter-spacing="1" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">Powered by YouVersion Platform + Gloo AI Studio</text>
</svg>
